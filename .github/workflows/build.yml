name: Build APK

# Запускается при каждом пуше в main/master и вручную через Actions → Run workflow
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Нужно для создания/обновления GitHub Release
permissions:
  contents: write

jobs:
  build:
    name: 🤖 Build & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Получаем код ───────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. JDK 17 (требуется AGP 8.x) ────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle 8.9 (без gradlew в репозитории) ─────────────────────────
      # gradle/actions умеет ставить Gradle напрямую — враппер не нужен.
      # 8.9 — минимум для AGP 8.7.2 (сама AGP нужна для compileSdk 35).
      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      # ── 4. Принимаем лицензии Android SDK ────────────────────────────────
      # Ubuntu-latest уже содержит SDK с API 34 и build-tools 34.0.0 —
      # нужно только принять лицензии, ничего доустанавливать не надо.
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── 4.5. ВРЕМЕННО: диагностика генерации Res-класса ───────────────────
      - name: Debug - dump generated Res class
        run: |
          gradle :shared:generateComposeResClass || true
          echo "=== searching for generated Res.kt ==="
          find . -path "*generated/compose*" -iname "*.kt" -print -exec cat {} \;

      # ── 5. Debug APK (всегда, без секретов) ──────────────────────────────
      # Debug APK подписывается автоматически дефолтным Android debug ключом.
      # Устанавливается на любой телефон с включённым "Неизвестные источники".
      - name: Build Debug APK
        run: gradle assembleDebug

      # ── 6. Signed Release APK (если keystore настроен) ───────────────────
      # Добавь три секрета в Settings → Secrets → Actions:
      #   KEYSTORE_BASE64  — keystore.jks закодированный в base64
      #   KEYSTORE_PASSWORD — пароль от keystore
      #   KEY_ALIAS         — алиас ключа (например: schedule)
      #   KEY_PASSWORD      — пароль ключа
      #
      # Как создать keystore:
      #   keytool -genkey -v -keystore keystore.jks -alias schedule \
      #     -keyalg RSA -keysize 2048 -validity 10000
      #   base64 keystore.jks | pbcopy   (Mac) / xclip (Linux)
      - name: Build signed Release APK
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "🔑 Keystore найден — собираем Release APK"
            echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/release.jks"
            gradle assembleRelease \
              -PKEYSTORE_PATH="$RUNNER_TEMP/release.jks" \
              -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
              -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
              -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
            echo "HAS_RELEASE=true" >> "$GITHUB_ENV"
          else
            echo "ℹ️  Keystore не настроен — Release APK пропускаем"
            echo "    Инструкция в комментарии выше (шаг 6)"
          fi

      # ── 7. Читаем версию из gradle.properties ─────────────────────────────
      - name: Read version
        id: ver
        run: |
          V=$(grep '^APP_VERSION=' gradle.properties | cut -d= -f2 | tr -d ' \r\n')
          echo "v=${V:-1.0.0}" >> "$GITHUB_OUTPUT"
          echo "Версия: ${V:-1.0.0}"

      # ── 8. Копируем APK в единую папку dist/ ──────────────────────────────
      - name: Collect APKs
        run: |
          V="${{ steps.ver.outputs.v }}"
          mkdir -p dist

          # Debug — всегда
          cp app/build/outputs/apk/debug/app-debug.apk \
             "dist/ScheduleApp-v${V}-debug.apk"

          # Release — только если собирался
          if [ "$HAS_RELEASE" = "true" ]; then
            cp app/build/outputs/apk/release/app-release.apk \
               "dist/ScheduleApp-v${V}.apk"
          fi

          echo "Файлы для релиза:"
          ls -lh dist/

      # ── 9. Удаляем предыдущий "latest" релиз ──────────────────────────────
      # Всегда держим один актуальный релиз — не захламляем Releases.
      - name: Delete previous release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin --delete latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Публикуем новый релиз ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "ScheduleApp v${{ steps.ver.outputs.v }}"
          body: |
            **Автосборка** · ветка `${{ github.ref_name }}` · коммит `${{ github.sha }}`

            ## 📥 Установка

            1. Скачай APK из вложений ниже
            2. На телефоне: Настройки → Безопасность → Неизвестные источники ✓
            3. Открой скачанный файл и установи

            | Файл | Описание |
            |------|----------|
            | `...-debug.apk` | Тестовый, подписан debug-ключом — всегда доступен |
            | `...apk` (без суффикса) | Подписанный релиз — только если настроен keystore |
          files: dist/*.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 11. Чистим keystore из памяти раннера ─────────────────────────────
      - name: Cleanup keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"

  build-desktop:
    name: 🖥️ Build Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            task: packageMsi
            artifact-glob: desktopApp/build/compose/binaries/main/msi/*.msi
          - os: ubuntu-latest
            task: packageDeb
            artifact-glob: desktopApp/build/compose/binaries/main/deb/*.deb
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      # nativeDistributions умеет собрать только формат, "родной" для ОС
      # раннера (msi/exe — только на Windows, deb — только на Linux и т.д.)
      - name: Build desktop package
        run: gradle :desktopApp:${{ matrix.task }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScheduleApp-desktop-${{ matrix.os }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
